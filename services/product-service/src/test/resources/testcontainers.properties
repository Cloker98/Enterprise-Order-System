# Testcontainers configuration for Windows Docker Desktop
# Force TCP socket instead of named pipes to avoid connectivity issues

# Use TCP socket (Docker Desktop exposes on localhost:2375 when enabled)
# If Docker Desktop doesn't expose TCP, use default Docker host
docker.host=tcp://localhost:2375

# Alternative: Use Docker Desktop's default socket
# docker.host=npipe:////./pipe/docker_engine

# Disable Ryuk container (cleanup) if causing issues
testcontainers.reuse.enable=false
testcontainers.ryuk.disabled=false

# Logging
testcontainers.logging.level=DEBUG