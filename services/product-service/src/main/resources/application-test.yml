spring:
  datasource:
    # Will be overridden by Testcontainers
    url: jdbc:postgresql://localhost:5432/test_db
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    clean-disabled: false  # Allow clean in tests

  data:
    redis:
      # Will be overridden by Testcontainers
      host: localhost
      port: 6379

logging:
  level:
    com.enterprise.product: DEBUG
    org.testcontainers: INFO
